{% load static %}
<!doctype html>
<html>

<head>
  <title>User Home</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}" />
</head>

<body>
  <div class="navbar">
    <h2 class="logo">JOBIFY</h2>

    <div class="nav-links">
      <span>Welcome, {{ candidate.name }}</span>
      <a href="{% url 'user_home' %}">Home</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>
  </div>

  {% if messages %}
  <div class="simple-popup">
    {% for message in messages %}
    {{ message }}
    {% endfor %}
  </div>
  {% endif %}

  <script>
    setTimeout(function () {
      let popup = document.querySelector(".simple-popup");
      if (popup) {
        popup.remove();
      }
    }, 2000);  // 2000ms = 2 seconds
  </script>

  <div class="card-container">
    <a href="{% url 'find_jobs' %}" class="dash-card"> Find Jobs </a>

    <a href="{% url 'applied_jobs' %}" class="dash-card"> Applied Jobs </a>
  </div>

</body>

</html>
